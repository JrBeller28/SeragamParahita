
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parahita Prima Sentosa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
</head>
<body class="bg-slate-50 text-slate-800">

<!-- NAVBAR -->
<header class="fixed w-full bg-white/80 backdrop-blur border-b border-slate-200 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-xl font-bold">PARAHITA</h1>
    <button onclick="toggleAdmin()" class="text-sm text-teal-600">Admin</button>
  </div>
</header>

<!-- HERO -->
<section class="h-screen flex items-center justify-center text-center px-6 bg-gradient-to-r from-teal-500 to-blue-500 text-white">
  <div>
    <h2 class="text-4xl md:text-6xl font-bold mb-6">Solusi Seragam & Merchandise</h2>
    <button onclick="openOrder()" class="bg-white text-teal-600 px-8 py-3 rounded-full font-semibold">Buat Order</button>
  </div>
</section>

<!-- ORDER MODAL -->
<div id="orderModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
  <div class="bg-white p-6 rounded-xl w-full max-w-md">
    <h3 class="text-xl font-bold mb-4">Form Order</h3>
    <input id="company" placeholder="Nama Perusahaan" class="w-full mb-2 p-2 border rounded" />
    <input id="email" placeholder="Email" class="w-full mb-2 p-2 border rounded" />
    <textarea id="detail" placeholder="Detail Order" class="w-full mb-2 p-2 border rounded"></textarea>
    <button onclick="saveOrder()" class="bg-teal-600 text-white w-full py-2 rounded">Submit</button>
    <button onclick="closeOrder()" class="mt-2 text-sm">Tutup</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden p-6">
  <h2 class="text-2xl font-bold mb-4">Admin Panel</h2>
  <table class="w-full border">
    <thead>
      <tr class="bg-slate-200">
        <th class="p-2">Perusahaan</th>
        <th>Email</th>
        <th>Detail</th>
      </tr>
    </thead>
    <tbody id="orderList"></tbody>
  </table>
</div>

<script>
const API = 'https://seragamparahita-production.up.railway.app'

// MODAL
function openOrder(){
  document.getElementById('orderModal').classList.remove('hidden')
}

function closeOrder(){
  document.getElementById('orderModal').classList.add('hidden')
}

// SAVE ORDER (FIX)
async function saveOrder(){
  const data = {
    company: document.getElementById('company').value,
    email: document.getElementById('email').value,
    detail: document.getElementById('detail').value
  }

  try {
    await fetch(API + '/orders',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    })

    alert('Order berhasil dikirim')
    closeOrder()

  } catch (err){
    alert('Server error')
    console.log(err)
  }
}

// TOGGLE ADMIN
function toggleAdmin(){
  const panel = document.getElementById('adminPanel')
  panel.classList.toggle('hidden')
  loadOrders()
}

// LOAD ORDERS (FIX)
async function loadOrders(){
  try {
    const res = await fetch(API + '/orders')
    const orders = await res.json()

    const list = document.getElementById('orderList')
    list.innerHTML = ''

    orders.forEach(o=>{
      list.innerHTML += `
        <tr class="border">
          <td class="p-2">${o.company}</td>
          <td>${o.email}</td>
          <td>${o.detail}</td>
        </tr>
      `
    })

  } catch (err){
    alert('Gagal load data')
    console.log(err)
  }
}
</script>

</body>
</html>
