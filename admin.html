<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Parahita</title>
  <button onclick="logout()" class="text-sm text-teal-600">Log Out</button>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="font-bold text-lg">Dashboard Admin</h1>
  <button onclick="logout()" class="text-red-500 text-sm">Logout</button>
</header>

<div class="p-6 max-w-7xl mx-auto">

  <!-- STATS -->
  <div class="grid md:grid-cols-3 gap-4 mb-6">

    <div class="bg-white p-6 rounded-xl shadow">
      <p class="text-sm text-slate-500">Total Order</p>
      <h2 id="totalOrder" class="text-2xl font-bold">0</h2>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <p class="text-sm text-slate-500">Email Masuk</p>
      <h2 id="totalEmail" class="text-2xl font-bold">0</h2>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <p class="text-sm text-slate-500">Hari Ini</p>
      <h2 id="todayOrder" class="text-2xl font-bold">0</h2>
    </div>

  </div>

  <!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden p-6">
  <h2 class="text-2xl font-bold mb-4">Admin Panel</h2>
  <table class="w-full border">
    <thead>
      <tr class="bg-slate-200">
        <th class="p-2">Perusahaan</th>
        <th>Email</th>
        <th>Detail</th>
      </tr>
    </thead>
    <tbody id="orderList"></tbody>
  </table>
</div>

<script>
const API = 'https://seragamparahita-production.up.railway.app'
function openOrder(){document.getElementById('orderModal').classList.remove('hidden')}
function closeOrder(){document.getElementById('orderModal').classList.add('hidden')}
// 🔐 PROTEKSI LOGIN
if(localStorage.getItem('login') !== 'true'){
  window.location.href = 'login.html'
}
function saveOrder(){
  const data={
    company:document.getElementById('company').value,
    email:document.getElementById('email').value,
    detail:document.getElementById('detail').value
  }

  let orders=JSON.parse(localStorage.getItem('orders')||'[]')
  orders.push(data)
  localStorage.setItem('orders',JSON.stringify(orders))

  alert('Order berhasil dikirim')
  closeOrder()
}

function toggleAdmin(){
  const panel=document.getElementById('adminPanel')
  panel.classList.toggle('hidden')
  loadOrders()
}

function loadOrders(){
  const list=document.getElementById('orderList')
  list.innerHTML=''
  let orders=JSON.parse(localStorage.getItem('orders')||'[]')

  orders.forEach(o=>{
    list.innerHTML+=`<tr class="border">
      <td class="p-2">${o.company}</td>
      <td>${o.email}</td>
      <td>${o.detail}</td>
    </tr>`
  })
}
catch(err){
    alert('Gagal load data')
    console.log(err)
  }

// LOGOUT
function logout(){
  localStorage.removeItem('login')
  window.location.href = 'login.html'
}

loadData()
</script>

</body>
</html>
