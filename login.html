<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Parahita</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-teal-500 to-blue-500 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-80">

  <h2 class="text-2xl font-bold mb-6 text-center text-slate-700">
    Login Admin
  </h2>

  <input id="username" placeholder="Username"
    class="w-full mb-3 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />

  <input id="password" type="password" placeholder="Password"
    class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />

  <button onclick="login()"
    id="btnLogin"
    class="w-full bg-teal-600 text-white py-3 rounded-lg font-semibold hover:bg-teal-700 transition">
    Login
  </button>

  <p id="error" class="text-red-500 text-sm mt-3 text-center hidden">
    Username / Password salah
  </p>

</div>

<script>
const API = 'https://seragamparahita-production.up.railway.app'

// AUTO REDIRECT JIKA SUDAH LOGIN
if(localStorage.getItem('login') === 'true'){
  window.location.href = 'admin.html'
}

async function login(){
  const btn = document.getElementById('btnLogin')
  const error = document.getElementById('error')

  btn.innerText = 'Loading...'
  btn.disabled = true
  error.classList.add('hidden')

  try {
    const res = await fetch(API + '/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    })

    const data = await res.json()

    if(data.success){
      localStorage.setItem('login','true')
      window.location.href = 'admin.html'
    } else {
      error.classList.remove('hidden')
    }

  } catch(err){
    alert('Server error / backend belum aktif')
    console.log(err)
  }

  btn.innerText = 'Login'
  btn.disabled = false
}
</script>

</body>
</html>
