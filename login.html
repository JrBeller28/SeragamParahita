<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-slate-100">

<div class="bg-white p-8 rounded shadow w-80">
  <h2 class="text-xl font-bold mb-4 text-center">Login Admin</h2>
  <input id="username" placeholder="Username" class="w-full mb-3 p-2 border rounded" />
  <input id="password" type="password" placeholder="Password" class="w-full mb-3 p-2 border rounded" />
  <button onclick="login()" class="w-full bg-teal-600 text-white py-2 rounded">Login</button>
</div>

<script>
const API = 'seragamparahita-production.up.railway.app'

async function login(){
  const res = await fetch(API + '/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  })

  const data = await res.json()

  if(data.success){
    localStorage.setItem('login','true')
    window.location.href = 'admin.html'
  } else {
    alert('Login gagal')
  }
}
</script>

</body>
</html>
